<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafArası - Satıcı</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/seller.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="index.html">RafArası</a>
        <button class="btn btn-outline-secondary me-2 menu-btn d-lg-none">MENÜ</button>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <form class="d-flex ms-auto me-3">
            <input class="form-control" type="search" placeholder="Aradığınız ürünün adını yazınız.">
          </form>
          <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-heart-fill text-danger"></i></a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-person-fill"></i></a></li>
            <li class="nav-item position-relative">
              <a class="nav-link" href="cart.html"><i class="bi bi-cart-fill"></i></a>
              <span class="cart-count position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <nav class="category-nav container mt-2 overflow-auto d-none d-lg-flex">
      <a href="#">EDEBİYAT KİTAPLARI</a>
      <a href="#">KIRTASİYE</a>
      <a href="#">OKULA YARDIMCI</a>
      <a href="#">SINAVLARA HAZIRLIK</a>
      <a href="#">ÇOCUK KİTAPLARI</a>
      <a href="#">KİTAP TAVSİYE</a>
      <a href="#">TÜM KAMPANYALAR</a>
      <span class="badge">ÇOK SATANLAR</span>
    </nav>
  </header>

  <main class="container main">
    <h2>Satıcı Alanı</h2>
    <form id="add-book-form">
      <div class="mb-3">
        <label for="title" class="form-label">Başlık</label>
        <input type="text" id="title" name="title" class="form-control">
      </div>
      <div class="mb-3">
        <label for="author" class="form-label">Yazar</label>
        <input type="text" id="author" name="author" class="form-control">
      </div>
      <div class="mb-3">
        <label for="price" class="form-label">Fiyat</label>
        <input type="number" id="price" name="price" step="0.01" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary">Kitap Ekle</button>
    </form>

    <section class="books row g-3" id="seller-books">
      <!-- Seller's book listings -->
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 RafArası. Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/pages/seller.js"></script>
</body>
</html>
